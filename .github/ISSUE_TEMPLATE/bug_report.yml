name: 🐛 Bug Report
description: Report a bug or issue
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out the information below to help us diagnose and fix the issue.

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run command: `...`
        2. Do something else: `...`
        3. Error occurs
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: Describe the expected outcome
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: Describe what actually occurred
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error Output
      description: Full error message or output (if any)
      render: shell
      placeholder: Paste the complete error message here
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version
      description: The version or commit hash of this project you are using
      placeholder: e.g., 1.0.0, latest main branch, commit abc123def
    validations:
      required: true

  - type: textarea
    id: distribution
    attributes:
      label: Distribution
      description: Any relevant distribution details
      placeholder: e.g., Ubuntu 24.04, Fedora 43, Arch Linux, etc.
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context about the problem
      placeholder: Add any other relevant information, screenshots, or context
    validations:
      required: false

  - type: dropdown
    id: reproducibility
    attributes:
      label: Reproducibility
      description: How often can you reproduce this issue?
      options:
        - Every time
        - Most of the time
        - Occasionally
        - Only happened once
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I have provided all the requested information above
          required: true
